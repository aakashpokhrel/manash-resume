<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Manash Pokhrel | SEO Specialist &amp; Digital Marketing Professional</title>
    <meta
      name="description"
      content="Portfolio of Manash Pokhrel, an SEO specialist and digital marketing professional based in Kathmandu, Nepal, with 11+ years of business management and operational leadership experience."
    />
    <meta name="author" content="Manash Pokhrel" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Manash Pokhrel | SEO Specialist & Digital Marketing Professional" />
    <meta
      property="og:description"
      content="Portfolio of Manash Pokhrel, an SEO specialist and digital marketing professional based in Kathmandu, Nepal, with 11+ years of business management and operational leadership experience."
    />
    <meta property="og:image" content="/og-image.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Manash Pokhrel | SEO Specialist & Digital Marketing Professional" />
    <meta
      name="twitter:description"
      content="Portfolio of Manash Pokhrel, an SEO specialist and digital marketing professional with hands-on experience in technical SEO, WordPress, Google Analytics, and Google Ads."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply theme before paint to avoid flash of incorrect theme.
      (function () {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
